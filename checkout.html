<!-- JAVASCRIPT -->
<script>
function getCart() {
  return JSON.parse(localStorage.getItem("cart")) || [];
}

function renderCheckout() {
  const cart = getCart();
  const summaryBox = document.getElementById("orderItems");
  const totalBox = document.getElementById("orderTotal");

  summaryBox.innerHTML = "";
  let grandTotal = 0;

  if (cart.length === 0) {
    summaryBox.innerHTML = "<li>Your cart is empty.</li>";
    totalBox.textContent = "₹0";
    return;
  }

  cart.forEach(item => {
    const itemTotal = item.price * item.qty;
    grandTotal += itemTotal;

    const li = document.createElement("li");
    li.textContent = `${item.name} × ${item.qty} = ₹${itemTotal}`;
    summaryBox.appendChild(li);
  });

  totalBox.textContent = "₹" + grandTotal;
}

document.getElementById("placeOrderBtn").addEventListener("click", () => {
  const cart = getCart();

  if (cart.length === 0) {
    alert("❌ Your cart is empty!");
    return;
  }

  alert("🎉 Order placed successfully!");
  localStorage.removeItem("cart");

  // redirect after user clicks OK
  window.location.href = "index.html";
});

renderCheckout();
</script>


<!-- CART BADGE -->

  <script>
const toggleBtn = document.getElementById("darkToggle");

// Load saved mode
if (localStorage.getItem("darkMode") === "on") {
  document.body.classList.add("dark");
  toggleBtn.textContent = "☀️";
}

toggleBtn.addEventListener("click", () => {
  document.body.classList.toggle("dark");

  if (document.body.classList.contains("dark")) {
    localStorage.setItem("darkMode", "on");
    toggleBtn.textContent = "☀️";
  } else {
    localStorage.setItem("darkMode", "off");
    toggleBtn.textContent = "🌙";
  }
});
</script>
<script>
(function () {
  const cart = JSON.parse(localStorage.getItem("cart")) || [];
  const badge = document.getElementById("cartCount");

  if (!badge) return;

  const totalQty = cart.reduce((sum, item) => sum + Number(item.qty), 0);
  badge.textContent = totalQty;
})();
</script>
