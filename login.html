<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | FoodieHub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="icon" href="assets/images/favicon.png" type="image/png">

  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/login.css">
  <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff5722">
<!-- Bootstrap UI Framework -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

</head>
<body>

<!-- NAVBAR -->
<nav class="main-navbar">
  <div class="nav-inner">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
<a href="menu.html">
Menu
</a>

    <a href="contact.html">Contact</a>
    <a href="login.html" class="active">Login</a>
    <a href="#" id="logoutBtn">Logout</a>

     <button id="darkToggle" class="dark-toggle" aria-label="Toggle dark mode">
  🌙
</button>
  </div>
</nav>

<header class="header">
  <h1>Account Access</h1>
  <p>Login or create your account</p>
</header>
<main class="page-content">
<div class="login-page">
  <div class="login-box">

    <!-- LOGIN -->
    <div id="loginForm">
      <form onsubmit="handleLogin(event)">
        <h2 class="form-title">Login</h2>

        <input type="email" id="email" placeholder="Email" required>

        <div class="password-box">
          <input type="password" id="password" placeholder="Password" required>
          <span class="toggle-password"
                onclick="togglePassword('password', this)">SHOW</span>
        </div>

        <button type="submit">Login</button>

        <p class="switch-text">
          New user?
          <span onclick="showSignup()">Create account</span>
        </p>
      </form>
    </div>

    <!-- SIGN UP -->
    <div id="signupForm" style="display:none;">
      <form onsubmit="handleSignup(event)">
        <h2 class="form-title">Sign Up</h2>

        <input type="text" placeholder="Full Name" required>
        <input type="email" id="signupEmail" placeholder="Email" required>


        <div class="password-box">
          <input type="password" id="signupPass" placeholder="Password" required>
          <span class="toggle-password"
                onclick="togglePassword('signupPass', this)">SHOW</span>
        </div>

        <button type="submit">Sign Up</button>

        <p class="switch-text">
          Already have an account?
          <span onclick="showLogin()">Login</span>
        </p>
      </form>
    </div>

  </div>
</div>
</main>
<footer class="footer">
  <p>© 2026 FoodieHub Restaurant. All rights reserved.</p>

  <div class="social-icons">
    <a href="https://www.instagram.com/" target="_blank" aria-label="Instagram">
      <i class="fab fa-instagram"></i>
    </a>

    <a href="https://www.facebook.com/" target="_blank" aria-label="Facebook">
      <i class="fab fa-facebook-f"></i>
    </a>

    <a href="https://www.youtube.com/" target="_blank" aria-label="YouTube">
      <i class="fab fa-youtube"></i>
    </a>

    <a href="https://www.snapchat.com/" target="_blank" aria-label="Snapchat">
      <i class="fab fa-snapchat-ghost"></i>
    </a>
  </div>
</footer>


<script>
function togglePassword(id, el) {
  const input = document.getElementById(id);
  if (input.type === "password") {
    input.type = "text";
    el.textContent = "HIDE";
  } else {
    input.type = "password";
    el.textContent = "SHOW";
  }
}

function showSignup() {
  document.getElementById("loginForm").style.display = "none";
  document.getElementById("signupForm").style.display = "block";
}

function showLogin() {
  document.getElementById("signupForm").style.display = "none";
  document.getElementById("loginForm").style.display = "block";
}

async function handleSignup(e) {
  e.preventDefault();

  const email = document.getElementById("signupEmail").value;
  const password = document.getElementById("signupPass").value;

  try {
    await signupUser(email, password);
    alert("Account created successfully!");
    showLogin();
  } catch (err) {
    alert(err.message);
  }
}


async function handleLogin(e) {
  e.preventDefault();

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    await loginUser(email, password);
    window.location.href = "index.html";
  } catch (err) {
    alert(err.message);
  }
}

</script>

<script>
const toggleBtn = document.getElementById("darkToggle");

// Load saved mode
if (localStorage.getItem("darkMode") === "on") {
  document.body.classList.add("dark");
  toggleBtn.textContent = "☀️";
}

toggleBtn.addEventListener("click", () => {
  document.body.classList.toggle("dark");

  if (document.body.classList.contains("dark")) {
    localStorage.setItem("darkMode", "on");
    toggleBtn.textContent = "☀️";
  } else {
    localStorage.setItem("darkMode", "off");
    toggleBtn.textContent = "🌙";
  }
});
</script>
<script>
(function () {
  const cart = JSON.parse(localStorage.getItem("cart")) || [];
  const badge = document.getElementById("cartCount");

  if (!badge) return;

  const totalQty = cart.reduce((sum, item) => sum + Number(item.qty), 0);
  badge.textContent = totalQty;
})();
</script>



<script src="assets/js/cart.js" defer></script>

<script type="module" src="assets/js/firebase.js"></script>

<script>
document.getElementById("logoutBtn")?.addEventListener("click", async (e) => {
  e.preventDefault();

  try {
    await logoutUser();
    window.location.href = "login.html";
  } catch (err) {
    alert("Logout failed");
  }
});
</script>
<!-- AOS Animation Script -->
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

<script>
AOS.init({
duration:1000,
once:true
});
</script>

</body>
</html>
